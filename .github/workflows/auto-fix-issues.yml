name: Auto Fix Issues

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  auto-fix:
    if: ${{ !contains(github.event.issue.labels.*.name, 'no-auto-fix') && !contains(github.event.issue.labels.*.name, 'discussion') }}
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      BRANCH_NAME: fix/issue-${{ github.event.issue.number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create fix branch
        run: git checkout -b "$BRANCH_NAME"

      - name: Run issue auto-fix implementation
        id: implement
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("node:fs");
            const path = require("node:path");

            const issueTitle = process.env.ISSUE_TITLE || "";
            const issueBody = process.env.ISSUE_BODY || "";
            const issueContext = `# ${issueTitle}\n\n${issueBody}`;
            const workspaceRoot = process.cwd();

            const normalizeRepoPath = (inputPath) => {
              if (!inputPath || typeof inputPath !== "string") {
                return null;
              }
              const cleaned = inputPath
                .trim()
                .replace(/^["'`]|["'`]$/g, "")
                .replace(/\\/g, "/")
                .replace(/^\.\//, "");
              if (!cleaned || cleaned.startsWith("/") || cleaned.includes("..")) {
                return null;
              }
              return cleaned;
            };

            const extractEditsFromJsonBlocks = (content) => {
              const edits = [];
              const jsonBlocks = [...content.matchAll(/```json\s*([\s\S]*?)```/gi)];
              for (const block of jsonBlocks) {
                try {
                  const parsed = JSON.parse(block[1]);
                  const candidates = Array.isArray(parsed?.edits) ? parsed.edits : Array.isArray(parsed) ? parsed : [];
                  for (const candidate of candidates) {
                    const file = normalizeRepoPath(candidate.file || candidate.path);
                    const find = typeof candidate.find === "string" ? candidate.find : "";
                    const replace = typeof candidate.replace === "string" ? candidate.replace : "";
                    if (file && find) {
                      edits.push({ file, find, replace });
                    }
                  }
                } catch (error) {
                  core.warning(`Skipping invalid JSON block: ${error.message}`);
                }
              }
              return edits;
            };

            const extractEditsFromReplacePhrases = (content) => {
              const edits = [];
              const replacePattern = /(?:in|file)\s+[`"]([^`"\n]+)[`"][^.\n]*?replace\s+[`"]([\s\S]*?)[`"]\s+with\s+[`"]([\s\S]*?)[`"]/gi;
              for (const match of content.matchAll(replacePattern)) {
                const file = normalizeRepoPath(match[1]);
                const find = match[2];
                const replace = match[3];
                if (file && find) {
                  edits.push({ file, find, replace });
                }
              }
              return edits;
            };

            const extractEditsFromFindReplaceBlocks = (content) => {
              const edits = [];
              const filePattern = /(?:^|\n)(?:file|path)\s*:\s*([^\n]+)\n([\s\S]*?)(?=\n(?:file|path)\s*:|$)/gi;
              for (const fileBlock of content.matchAll(filePattern)) {
                const file = normalizeRepoPath(fileBlock[1]);
                if (!file) {
                  continue;
                }
                const section = fileBlock[2];
                const findMatch = section.match(/(?:^|\n)find\s*:\s*([\s\S]*?)(?=\nreplace\s*:|$)/i);
                const replaceMatch = section.match(/(?:^|\n)replace\s*:\s*([\s\S]*?)$/i);
                const find = findMatch ? findMatch[1].trim() : "";
                const replace = replaceMatch ? replaceMatch[1].trim() : "";
                if (find) {
                  edits.push({ file, find, replace });
                }
              }
              return edits;
            };

            try {
              const edits = [
                ...extractEditsFromJsonBlocks(issueContext),
                ...extractEditsFromFindReplaceBlocks(issueContext),
                ...extractEditsFromReplacePhrases(issueContext),
              ];

              const uniqueEdits = [];
              const seen = new Set();
              for (const edit of edits) {
                const key = `${edit.file}\n${edit.find}\n${edit.replace}`;
                if (!seen.has(key)) {
                  seen.add(key);
                  uniqueEdits.push(edit);
                }
              }

              if (!uniqueEdits.length) {
                throw new Error(
                  "No actionable edit instructions found in issue body. Provide JSON edits or explicit file/replace directives."
                );
              }

              let appliedCount = 0;
              const appliedFiles = new Set();

              for (const edit of uniqueEdits) {
                const absolutePath = path.resolve(workspaceRoot, edit.file);
                if (!absolutePath.startsWith(workspaceRoot)) {
                  throw new Error(`Blocked path outside repository: ${edit.file}`);
                }
                if (!fs.existsSync(absolutePath)) {
                  throw new Error(`Target file does not exist: ${edit.file}`);
                }

                const current = fs.readFileSync(absolutePath, "utf8");
                if (!current.includes(edit.find)) {
                  throw new Error(`Could not find target text in ${edit.file}`);
                }

                const occurrences = current.split(edit.find).length - 1;
                const next = current.replace(edit.find, edit.replace);
                fs.writeFileSync(absolutePath, next, "utf8");

                appliedCount += 1;
                appliedFiles.add(edit.file);
                core.info(`Applied edit in ${edit.file} (${occurrences} match(es), replaced first occurrence).`);
              }

              core.setOutput("implementation_ran", "true");
              core.setOutput("applied_edits", String(appliedCount));
              core.setOutput("applied_files", Array.from(appliedFiles).join(", "));
            } catch (error) {
              core.setOutput("implementation_ran", "false");
              core.setFailed(`Auto-fix implementation failed: ${error.message}`);
            }

      - name: Build to verify TypeScript
        run: npm run build

      - name: Commit changes
        id: commit
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "fix: ${ISSUE_TITLE} (closes #${ISSUE_NUMBER})"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push branch
        if: steps.commit.outputs.has_changes == 'true'
        run: git push origin "$BRANCH_NAME"

      - name: Create pull request
        if: steps.commit.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const issueNumber = Number(process.env.ISSUE_NUMBER);
              const issueTitle = process.env.ISSUE_TITLE;
              const branch = process.env.BRANCH_NAME;

              const body = [
                `## Automated fix for issue #${issueNumber}`,
                "",
                `Closes #${issueNumber}`,
                "",
                "### Description of changes",
                "- Applied automated implementation based on the issue title/body.",
                "- Ran `npm run build` with `NODE_ENV=production` to verify TypeScript/build integrity.",
                "- Committed generated changes from automation flow.",
              ].join("\n");

              const pr = await github.rest.pulls.create({
                owner,
                repo,
                title: `Fix: ${issueTitle}`,
                head: branch,
                base: "main",
                body
              });

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.data.number,
                labels: ["automated", "from-issue"]
              });
            } catch (error) {
              core.setFailed(`PR creation failed: ${error.message}`);
            }

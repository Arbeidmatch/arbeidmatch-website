name: Auto Fix Production Error

on:
  issues:
    types: [opened, labeled]

jobs:
  auto-fix:
    if: contains(github.event.issue.labels.*.name, 'auto-fix-pending')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate fix with Claude
        id: claude_fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node .github/scripts/generate-fix.js \
            --issue-title "${{ github.event.issue.title }}" \
            --issue-body "${{ github.event.issue.body }}" \
            --issue-number "${{ github.event.issue.number }}"

      - name: Check if fix was generated
        id: check_fix
        run: |
          if [ -f ".github/fix-output/changes.json" ]; then
            echo "fix_generated=true" >> $GITHUB_OUTPUT
          else
            echo "fix_generated=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply fix
        if: steps.check_fix.outputs.fix_generated == 'true'
        run: node .github/scripts/apply-fix.js

      - name: Run build
        if: steps.check_fix.outputs.fix_generated == 'true'
        run: npm run build

      - name: Create Pull Request
        if: steps.check_fix.outputs.fix_generated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(auto): ${{ github.event.issue.title }}"
          branch: auto-fix/issue-${{ github.event.issue.number }}
          title: "[AUTO FIX] ${{ github.event.issue.title }}"
          body: |
            ## Automatic fix generated by Claude

            Fixes issue #${{ github.event.issue.number }}

            ### What was changed
            Generated automatically based on error analysis.

            ### Build status
            Build passed before this PR was created.

            ---
            _Review before merge if unsure. Auto-merge is enabled if build passes._
          labels: auto-fix-ready
          auto-merge: true
          merge-strategy: squash

      - name: Close issue on success
        if: steps.check_fix.outputs.fix_generated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: 'Auto-fix generated and PR created. Build passed. Auto-merging to main.'
            })
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              state: 'closed',
              labels: ['auto-fix-done']
            })

      - name: Notify Slack on success
        if: steps.check_fix.outputs.fix_generated == 'true'
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"Fix automat deployed pentru: ${{ github.event.issue.title }}\"}"

      - name: Notify Slack on failure
        if: steps.check_fix.outputs.fix_generated == 'false'
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"Nu am putut genera fix automat pentru issue #${{ github.event.issue.number }}. Necesita interventie manuala.\"}"
